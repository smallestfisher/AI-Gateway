# AI Agent Gateway — local dev stack.
# Usage: docker compose up --build
# Postgres is bootstrapped from migrations/0001_init.up.sql on first init.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: aihub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/0001_init.up.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d aihub"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      GATEWAY_POSTGRES_DSN: postgres://gateway:gateway@postgres:5432/aihub?sslmode=disable
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_LOG_LEVEL: info
    ports:
      - "8080:8080"

volumes:
  pgdata:
